<body id="game-body" class="bg-slate-900 min-h-screen font-sans text-slate-100 flex items-center justify-center p-4 transition-colors duration-500">

    <div id="main-card" class="w-full max-w-4xl bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700 transition-all duration-500">
        
        <!-- หน้าจอ Login / สร้างห้อง / เข้าร่วมห้อง -->
        <div id="screen-login" class="max-w-md mx-auto py-4">

                <img src="https://cdn.phototourl.com/free/2026-05-29-a5ba99cf-a059-4e1d-88da-57481a1f6972.png" alt="Party Game" class="w-full h-full object-cover">
            </div>

            <h1 class="text-4xl font-black text-center text-emerald-400 mb-6 tracking-wide">🚫 เกมคำต้องห้าม</h1>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">ชื่อผู้เล่นของคุณ</label>
                    <input id="input-name" type="text" placeholder="กรอกชื่อเล่นสั้นๆ" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4 pt-2">
                    <button id="btn-action-create" onclick="createRoom()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-4 rounded-xl shadow-lg transition transform active:scale-95">👑 สร้างห้อง (BOSS)</button>
                    <button id="btn-action-showjoin" onclick="showJoinField()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-4 rounded-xl shadow-lg transition transform active:scale-95">🏃 เข้าร่วมห้อง</button>
                </div>
                <div id="join-field" class="hidden space-y-3 pt-4 border-t border-slate-700">
                    <input id="input-roomcode" type="text" placeholder="ใส่รหัสห้องจากบอส (เช่น S12345)" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-center text-xl font-mono font-bold tracking-widest text-emerald-400 outline-none uppercase">
                    <button id="btn-action-join" onclick="joinRoom()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black p-4 rounded-xl transition transform active:scale-95">ยืนยันเข้าร่วมเกม</button>
                </div>
            </div>
        </div>

        <!-- หน้าจอห้องเกมหลัก -->
        <div id="screen-game" class="hidden">
            <div class="flex flex-wrap justify-between items-center border-b border-slate-700 pb-4 mb-6 gap-4">
                <div class="space-y-1">
                    <div class="text-xs uppercase tracking-wider text-slate-400">ROOM ID</div>
                    <div class="flex items-center gap-3">
                        <div id="display-roomcode" class="text-2xl font-mono font-black text-emerald-400 select-all">กำลังเริ่มเกม</div>
                        
                        <button id="btn-close-room" onclick="bossDestroyRoom()" class="hidden bg-rose-600/20 hover:bg-rose-600 text-rose-400 hover:text-white text-xs font-bold px-2.5 py-1.5 rounded-lg border border-rose-500/30 transition">
                            ❌ ปิดห้องเกม

                        <button id="btn-leave-room" onclick="playerLeaveRoom()" class="hidden bg-slate-700 hover:bg-rose-600 text-slate-300 hover:text-white text-xs font-bold px-2.5 py-1.5 rounded-lg border border-slate-600 transition">

                    </div>
                    <div class="text-sm text-slate-400 mt-1">Headห้อง: <span id="display-bossname" class="text-white font-bold">-</span></div>

                    <div id="player-count" class="text-xs bg-slate-700/50 text-slate-300 px-3 py-1 rounded-full inline-block mt-2 font-medium">ผู้เล่นในห้อง: 0 คน</div>

            </div>

            <div id="area-play-zone">
                <div id="msg-waiting" class="text-center py-16 text-slate-400 space-y-3">
                    <div class="text-5xl animate-spin inline-block">⏳</div>
                    <p class="text-xl font-medium">รอเริ่มเกม...</p>

                <!-- แผงควบคุมเฉพาะบอสเจ้าของห้อง -->
                <div id="boss-panel" class="hidden mb-8 p-5 bg-indigo-950/40 border border-indigo-800 rounded-xl space-y-4">
                    <h3 class="text-sm font-bold text-indigo-400 uppercase tracking-wider">🛠️ แผงควบคุมHeadห้อง</h3>
                    
                    <div id="boss-time-selector" class="flex items-center gap-3 bg-slate-900 p-3 rounded-lg border border-slate-700 w-fit">
                        <label class="text-sm font-medium text-slate-300">⏱️ ตั้งเวลาเล่นรอบนี้:</label>
                        <select id="select-duration" onchange="bossChangeDuration()" class="bg-slate-800 text-emerald-400 border border-slate-600 rounded-md p-1 font-bold outline-none cursor-pointer">
                            <option value="300">5 นาที</option>
                            <option value="360">6 นาที</option>
                            <option value="420">7 นาที</option>
                            <option value="480">8 นาที</option>
                            <option value="540">9 นาที</option>
                            <option value="600">10 นาที</option>
                        </select>
                    </div>

                    <div class="flex gap-3">
                        <button id="btn-start" onclick="bossStartGame()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black px-8 py-4 rounded-xl shadow-md transition transform active:scale-95">🏁 เริ่มเกมนับถอยหลัง</button>

                    </div>
                </div>

                <!-- การ์ดคำต้องห้ามส่วนตัว (ซ่อนคำของตัวเอง) -->
                <div id="my-word-card" class="hidden max-w-sm mx-auto bg-slate-900 p-6 rounded-2xl border-2 border-dashed border-slate-700 text-center mb-8 shadow-xl">
                    <span id="my-word-label" class="text-xs font-bold uppercase tracking-widest text-slate-400">คำต้องห้ามที่คุณห้ามพูด</span>
                    <div id="my-word" class="text-5xl font-black text-amber-400 my-3 tracking-wide">❓❓❓</div>
                    <p id="my-word-subtext" class="text-xs text-rose-400 font-medium">* ห้ามแอบมองเด็ดขาด *</p>
                </div>

                <h3 id="grid-title" class="text-lg font-bold text-slate-300 uppercase tracking-wider mb-4">📋 คำต้องห้ามของเพื่อนรอบวง</h3>
                <div id="players-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
            </div>
        </div>
    </div>

    <script>

            ["เรียน", "สอบ", "อ่าน", "จำ", "ท่อง", "จด", "ติว", "ควิซ", "แล็ป", "เกรด", "การบ้าน", "รายงาน", "โปรเจกต์", "ส่ง", "ติด", "ตก", "ผ่าน", "ลอก", "ถาม", "ตอบ", "ฟัง", "ครู", "มหาลัย", "คณะ", "สาขา", "ห้องเรียน", "สมุด", "ปากกา", "โต๊ะ", "เพื่อน", "กลุ่ม", "สาย", "โดด", "วิชา", "หน่วยกิต", "ความรู้", "วิจัย", "ฝึกงาน", "จบ", "รับปริญญา"],
            ["เล่น", "ซ้อม", "แข่ง", "เชียร์", "จัด", "ค่าย", "ซุ้ม", "บอร์ด", "กีฬาสี", "ประกวด", "เต้น", "ร้อง", "รำ", "แสดง", "ละคร", "วิ่ง", "เดิน", "เตะ", "โยน", "รับ", "ตี", "ชก", "ปั่น", "ว่าย", "ถีบ", "กระโดด", "ลุย", "เชิญ", "เปิด", "ปิด", "แจก", "แถม", "โชว์", "เช็กอิน", "ไลฟ์", "ถ่ายรูป", "คลิป", "อัด", "ซาวด์", "สตาฟ"],
            ["เที่ยว", "ทริป", "จอง", "พัก", "ฟิน", "วิว", "ภูเขา", "ทะเล", "น้ำตก", "ป่า", "เกาะ", "หาด", "กางเต็นท์", "เดินป่า", "คาเฟ่", "ถ่ายรูป", "เช็กอิน", "ชิล", "พักผ่อน", "ชอป", "กิน", "ลอง", "ชิม", "ซื้อ", "ขาย", "ของฝาก", "ตั๋ว", "พาสปอร์ต", "โรงแรม", "รีสอร์ต", "โฮมสเตย์", "ล่องแพ", "ดำน้ำ", "ปีนเขา", "ชมวิว", "ตื่นตา", "สนุก", "หลง", "แผนที่"],
            ["ไป", "กลับ", "รถ", "เรือ", "เครื่องบิน", "รถไฟ", "บีทีเอส", "ใต้ดิน", "ตั๋ว", "ทาง", "ขับ", "ขี่", "ซ้อน", "โบก", "รอ", "ป้าย", "สถานี", "ท่าเรือ", "สนามบิน", "เลน", "ไฟแดง", "ไฟเขียว", "หลง", "ติด", "ช้า", "เร็ว", "ซิ่ง", "เบรก", "จอด", "เติมนํ้ามัน", "ชาร์จ", "แผนที่", "จีพีเอส", "กระเป๋า", "เป้", "ทางด่วน", "โค้ง", "ตรง", "เลี้ยว", "ถึง"],
            ["กิน", "นอน", "นั่ง", "ยืน", "เดิน", "วิ่ง", "ตื่น", "อาบน้ำ", "แต่งตัว", "คุย", "เมาท์", "ฟัง", "ดู", "เล่น", "คิด", "รัก", "ชอบ", "เกลียด", "โกรธ", "เหงา", "เศร้า", "สุข", "ยิ้ม", "หัวเราะ", "ร้องไห้", "เหนื่อย", "ท้อ", "สู้", "ทำ", "ใช้", "จ่าย", "ซื้อ", "หา", "เจอ", "พลาด", "จำ", "ลืม", "รอ", "เริ่ม", "โต"],
            ["บ้าน", "ห้อง", "นอน", "ครัว", "ส้วม", "เตียง", "หมอน", "ผ้าห่ม", "มุ้ง", "ตู้", "โต๊ะ", "เก้าอี้", "ไฟ", "พัดลม", "แอร์", "ทีวี", "ตู้เย็น", "เตา", "หม้อ", "กระทะ", "จาน", "ชาม", "ช้อน", "ส้อม", "แก้ว", "นํ้า", "ผ้า", "ไม้กวาด", "ถู", "ล้าง", "เช็ด", "ซัก", "ตาก", "พับ", "สวน", "ประตู", "หน้าต่าง", "พื้น", "รั้ว", "กุญแจ"],
            ["เออ", "เฮ้ย", "เนี่ย", "นั่นดิ", "จริง", "ใช่ไหม", "หรอ", "ปะ", "เอาดีๆ", "แก", "คุณ", "มึง", "กู", "ช่างมัน", "ชิลชิล", "แป๊บนะ", "โอเค", "อุยกู", "ว้าว", "อุ๊ย", "อ้าว", "เอ้า", "เง็ง", "แป้ก", "จึ้ง", "ปัง", "บูด", "ขำ", "ฮา", "ตลก", "เคลียร์", "จบ", "ไปกัน", "เอาไง", "ว่าไง", "จัดไป", "ใจเย็น", "สุดจัด", "เฉย", "บาย"]
        ];

        let peer = null;
        let myRole = null; 
        let myName = "";
        let connections = []; 
        let connToBoss = null; 
        let selectedSeconds = 300; 
        let gameState = { status: 'waiting', players: {}, bossName: '', timer: '05:00', countdownVal: 5, maxSeconds: 300 };
        let timerInterval = null;

        function showJoinField() { document.getElementById('join-field').classList.remove('hidden'); }

        // 👑 1. สร้างห้อง (เวอร์ชันบอสร่วมเล่น และรหัสห้อง S + เลข 5 หลัก)
        function createRoom() {
            myName = document.getElementById('input-name').value.trim();
            if(!myName) return alert('กรุณากรอกชื่อของคุณก่อนครับ');
            
            document.getElementById('btn-action-create').disabled = true;
            myRole = 'boss';

            // เจนรหัสห้องขึ้นต้นด้วย S ตามด้วยเลขสุ่ม 5 หลัก (เช่น S10293)
            const randomRoomId = "S" + Math.floor(10000 + Math.random() * 90000);
            peer = new Peer(randomRoomId);

            peer.on('open', (id) => {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-game').classList.remove('hidden');
                document.getElementById('display-roomcode').innerText = id;
                document.getElementById('display-bossname').innerText = myName;
                document.getElementById('boss-panel').classList.remove('hidden');
                
                document.getElementById('btn-close-room').classList.remove('hidden');
                document.getElementById('btn-leave-room').classList.add('hidden');

                gameState.bossName = myName;
                
                // ยัดบอสเข้าไปเป็นหนึ่งในผู้เล่นด้วยไอดีของตนเอง
                gameState.players[id] = { id: id, name: myName + " (บอส)", word: "", isDead: false, isRevealed: false, gameResult: "" };
                
                updateUI();
            });

            peer.on('connection', (conn) => {
                // [แก้บั๊กชื่อซ้ำ/หลุดเอ๋อ] ตรวจสอบ Connection เดิม ถ้าเคยมีผูกกับ Peer ID นี้อยู่แล้ว ให้ตัดออกก่อนรับสายใหม่
                connections = connections.filter(c => {
                    if (c.peer === conn.peer) {
                        c.close();
                        return false;
                    }
                    return true;
                });

                connections.push(conn);
                
                conn.on('data', (data) => {
                    if(data.type === 'join') {
                        gameState.players[conn.peer] = { id: conn.peer, name: data.name, word: "", isDead: false, isRevealed: false, gameResult: "" };
                        broadcastState();
                        updateUI();
                    }
                    if(data.type === 'leave') {
                        removePlayer(conn.peer);
                    }
                    // รับคำสั่งกดตกรอบที่ส่งมาจากลูกบ้าน
                    if(data.type === 'actionEliminate') {
                        if(gameState.players[data.targetId]) {
                            gameState.players[data.targetId].isDead = true;
                            broadcastState();
                            updateUI();
                        }
                    }
                    // รับคำสั่งตัดสินถูก/ผิดที่ส่งมาจากลูกบ้านช่วงหมดเวลา
                    if(data.type === 'actionJudge') {
                        if(gameState.players[data.targetId]) {
                            if(data.result === 'correct') {
                                gameState.players[data.targetId].isRevealed = true;
                                gameState.players[data.targetId].gameResult = "correct";
                            } else {
                                gameState.players[data.targetId].isDead = true;
                                gameState.players[data.targetId].isRevealed = true;
                                gameState.players[data.targetId].gameResult = "wrong";
                            }
                            broadcastState();
                            updateUI();
                        }
                    }
                });
                
                conn.on('close', () => { removePlayer(conn.peer); });
                conn.on('error', () => { removePlayer(conn.peer); });
            });
        }

        function removePlayer(peerId) {
            if(gameState.players[peerId]) {
                delete gameState.players[peerId];
                connections = connections.filter(c => c.peer !== peerId);
                broadcastState();
                updateUI();
            }
        }

        // 👞 บอสกดเตะผู้เล่นรายคน (ใช้ได้เฉพาะช่วงหน้ารอ Waiting Lobby)
        function bossKickPlayer(peerId) {
            if(myRole !== 'boss') return;
            if(peerId === peer.id) return alert('คุณไม่สามารถเตะตัวเองได้ครับ');
            
            const targetPlayer = gameState.players[peerId];
            if(!targetPlayer) return;

            if(confirm(`คุณต้องการเตะคุณ "${targetPlayer.name}" ออกจากห้องใช่หรือไม่?`)) {
                const targetConn = connections.find(c => c.peer === peerId);
                if(targetConn && targetConn.open) {
                    targetConn.send({ type: 'roomDestroyed' }); // สั่งให้ลูกบ้านฝั่งนั้นเคลียร์ตัวเองเคลียร์จอ
                    setTimeout(() => targetConn.close(), 200);
                }
                removePlayer(peerId);
            }
        }

        function bossDestroyRoom() {
            if(!confirm('คุณแน่ใจใช่ไหมที่จะ "ปิดห้องเกมนี้" ? ผู้เล่นทุกคนจะถูกเด้งออกทันที')) return;
            clearInterval(timerInterval);
            connections.forEach(conn => {
                if(conn.open) conn.send({ type: 'roomDestroyed' });
            });
            setTimeout(() => {
                if(peer) peer.destroy();
                window.location.reload();
            }, 500);
        }

        // 🏃 2. เข้าร่วมห้อง (สำหรับผู้เล่นทั่วไป)
        function joinRoom() {
            myName = document.getElementById('input-name').value.trim();
            const targetRoomId = document.getElementById('input-roomcode').value.trim().toUpperCase();
            if(!myName || !targetRoomId) return alert('กรุณากรอกชื่อและรหัสห้องให้ครบถ้วน');
            
            // [แก้บั๊กชื่อเบิ้ล] ล็อกปุ่มป้องกันผู้เล่นกดย้ำๆ ระหว่างทำการ Handshake เชื่อมต่อ
            document.getElementById('btn-action-join').disabled = true;
            document.getElementById('btn-action-join').innerText = "กำลังเชื่อมต่อ...";
            myRole = 'player';

            peer = new Peer(); 

            peer.on('open', (myPeerId) => {
                connToBoss = peer.connect(targetRoomId);

                connToBoss.on('open', () => {
                    document.getElementById('screen-login').classList.add('hidden');
                    document.getElementById('screen-game').classList.remove('hidden');
                    
                    document.getElementById('btn-leave-room').classList.remove('hidden');
                    document.getElementById('btn-close-room').classList.add('hidden');

                    connToBoss.send({ type: 'join', name: myName });
                });

                connToBoss.on('data', (data) => {
                    if(data.type === 'stateUpdate') {
                        gameState = data.state;
                        updateUI();
                    }
                    if(data.type === 'roomDestroyed') {
                        alert('🚪 คุณถูกเตะออกจากห้อง หรือบอสได้ทำการปิดห้องเกมนี้แล้วครับ!');
                        window.location.reload();
                    }
                });

                connToBoss.on('close', () => {
                    alert('การเชื่อมต่อกับบอสขาดหายไปหรือห้องถูกปิดแล้ว');
                    window.location.reload();
                });
            });

            peer.on('error', (err) => {
                alert('หารหัสห้องนี้ไม่พบ กรุณาเช็ครหัสห้องใหม่อีกครั้งครับ');
                document.getElementById('btn-action-join').disabled = false;
                document.getElementById('btn-action-join').innerText = "ยืนยันเข้าร่วมเกม";
            });
        }

        function playerLeaveRoom() {
            if(!confirm('คุณต้องการออกจากห้องเกมนี้ใช่ไหม?')) return;
            if(connToBoss && connToBoss.open) {
                connToBoss.send({ type: 'leave' });
                setTimeout(() => {
                    connToBoss.close();
                    if(peer) peer.destroy();
                    window.location.reload();
                }, 300);
            } else {
                window.location.reload();
            }
        }

        function bossChangeDuration() {
            if(myRole !== 'boss') return;
            selectedSeconds = parseInt(document.getElementById('select-duration').value);
            gameState.maxSeconds = selectedSeconds;
            let min = Math.floor(selectedSeconds / 60);
            gameState.timer = `${min < 10 ? "0"+min : min}:00`;
            broadcastState();
            updateUI();
        }

        // 📲 ฟังก์ชันส่วนกลางสำหรับการส่งคำสั่งกด Action ของทุกคนรอบวงไปยังเครื่องบอส (Server บอสประมวลผล)
        function sendActionToHost(actionObj) {
            if(myRole === 'boss') {
                // ถ้าบอสเป็นคนคลิกกดบนหน้าจอตัวเอง ให้ประมวลผลโดยตรงภายในเครื่องได้เลย
                if(actionObj.type === 'actionEliminate') {
                    if(gameState.players[actionObj.targetId]) gameState.players[actionObj.targetId].isDead = true;
                }
                if(actionObj.type === 'actionJudge') {
                    if(gameState.players[actionObj.targetId]) {
                        if(actionObj.result === 'correct') {
                            gameState.players[actionObj.targetId].isRevealed = true;
                            gameState.players[actionObj.targetId].gameResult = "correct";
                        } else {
                            gameState.players[actionObj.targetId].isDead = true;
                            gameState.players[actionObj.targetId].isRevealed = true;
                            gameState.players[actionObj.targetId].gameResult = "wrong";
                        }
                    }
                }
                broadcastState();
                updateUI();
            } else {
                // ถ้าผู้เล่นคนอื่นเป็นคนกด ให้ยิงคำสั่งไปบอกเครื่องบอสสะท้อนการอัปเดตกลับมา
                if(connToBoss && connToBoss.open) {
                    connToBoss.send(actionObj);
                }
            }
        }

        // 3. ฟังก์ชันเรนเดอร์อัปเดตหน้าจอทั้งหมด
        function updateUI() {
            document.getElementById('display-bossname').innerText = gameState.bossName;
            document.getElementById('timer-box').innerText = gameState.timer;
            
            const playersArr = Object.values(gameState.players);
            document.getElementById('player-count').innerText = `ผู้เล่นในห้อง: ${playersArr.length} คน`;

            const currentPeerId = peer ? peer.id : null;
            const me = gameState.players[currentPeerId];

            if(gameState.status === 'waiting') {
                toggleTheme('game-lobby');
                document.getElementById('msg-waiting').classList.remove('hidden');
                document.getElementById('area-countdown').classList.add('hidden');
                document.getElementById('my-word-card').classList.add('hidden');
                document.getElementById('timer-box').classList.add('hidden');
                if(myRole === 'boss') document.getElementById('boss-time-selector').classList.remove('hidden');
            } 
            else if(gameState.status === 'countdown') {
                document.getElementById('msg-waiting').classList.add('hidden');
                document.getElementById('area-countdown').classList.remove('hidden');
                document.getElementById('countdown-number').innerText = gameState.countdownVal;
                document.getElementById('players-grid').innerHTML = ''; 
                if(myRole === 'boss') document.getElementById('boss-time-selector').classList.add('hidden');
            } 
            else if(gameState.status === 'playing') {
                toggleTheme('game-active'); 
                document.getElementById('area-countdown').classList.add('hidden');
                document.getElementById('timer-box').classList.remove('hidden');
                if(myRole === 'boss') document.getElementById('boss-time-selector').classList.add('hidden');
                
                if(me) {
                    document.getElementById('my-word-card').classList.remove('hidden');
                    if(me.isDead) {
                        document.getElementById('my-word-label').innerText = "💀 คุณตกรอบแล้ว! คำต้องห้ามของคุณคือ:";
                        document.getElementById('my-word').className = "text-5xl font-black text-rose-500 my-3 tracking-wide";
                        document.getElementById('my-word').innerText = me.word;
                        document.getElementById('my-word-subtext').innerText = "รอบหน้าเอาใหม่นะค๊าบพี่บ่าว!";
                    } else {
                        document.getElementById('my-word-label').innerText = "คำต้องห้ามที่คุณห้ามพูด";
                        document.getElementById('my-word').className = "text-5xl font-black text-amber-400 my-3 tracking-wide";
                        document.getElementById('my-word').innerText = "❓❓❓"; 
                        document.getElementById('my-word-subtext').innerText = "* ห้ามแอบก้มมองเด็ดขาด ให้หันหน้าจอไม่ให้เพื่อนดู *";
                    }
                }
            } 
            else if(gameState.status === 'timeout') {
                toggleTheme('game-timeout'); 
                document.getElementById('timer-box').innerText = "💥 หมดเวลา!";
                
                if(me) {
                    document.getElementById('my-word-card').classList.remove('hidden');
                    if(me.isDead || me.isRevealed) {
                        if(me.gameResult === "correct") {
                            document.getElementById('my-word-label').innerText = "🎉 ยินดีด้วยคุณรอดและตอบถูก! คำของคุณคือ:";
                            document.getElementById('my-word').className = "text-5xl font-black text-emerald-400 my-3 tracking-wide";
                        } else {
                            document.getElementById('my-word-label').innerText = "💀 จบเกม! คำต้องห้ามของคุณคือ:";
                            document.getElementById('my-word').className = "text-5xl font-black text-rose-500 my-3 tracking-wide";
                        }
                        document.getElementById('my-word').innerText = me.word;
                        document.getElementById('my-word-subtext').innerText = "สรุปผลคำเรียบร้อยแล้ว";
                    } else {
                        document.getElementById('my-word-label').innerText = "⏱️ หมดเวลาแล้ว! รออภิปรายรอบวง";
                        document.getElementById('my-word').className = "text-5xl font-black text-amber-400 my-3 tracking-wide";
                        document.getElementById('my-word').innerText = "❓❓❓";
                        document.getElementById('my-word-subtext').innerText = "รอให้เพื่อนๆ ช่วยกันกดโหวตตัดสินผลลัพธ์คำของคุณ";
                    }
                }
            }

            drawGrid(playersArr, currentPeerId);
        }

        // ฟังก์ชันวาดตารางคนเล่นรอบวง (ดักสิทธิ์การมองเห็นและสลับปุ่มตามสถานะเกม)
        function drawGrid(players, currentPeerId) {
            const grid = document.getElementById('players-grid');
            grid.innerHTML = '';
            
            players.forEach(p => {
                const isMe = p.id === currentPeerId;
                let textWord = "⏳ หน้ารอ";
                
                if(gameState.status === 'playing' || gameState.status === 'timeout') {
                    if(p.isDead && gameState.status === 'playing') {
                        textWord = `💀 ${p.word}`;
                    } else if(gameState.status === 'timeout') {
                        if(p.isRevealed) {
                            if(p.gameResult === "correct") textWord = `🎉 ${p.word} (ถูก)`;
                            else textWord = `💀 ${p.word} (ผิด)`;
                        } else {
                            // มองเห็นคำของเพื่อนทุกคนยกเว้นคำของตนเอง
                            textWord = isMe ? "❓❓❓" : p.word;
                        }
                    } else {
                        textWord = isMe ? "❓❓❓" : p.word;
                    }
                }

                const card = document.createElement('div');
                let cardBg = 'bg-slate-900 border-slate-800';
                let textWordColor = 'text-emerald-400 font-black';
                
                if(p.isDead) {
                    cardBg = 'bg-slate-950/60 border-rose-950 opacity-70';
                    textWordColor = 'text-rose-500 font-bold';
                } else if(p.gameResult === "correct") {
                    cardBg = 'bg-slate-900 border-emerald-500/80 shadow-emerald-950';
                    textWordColor = 'text-emerald-400 font-black';
                } else if(isMe) {
                    cardBg = 'bg-indigo-950/40 border-indigo-500';
                }

                card.className = `p-4 rounded-xl text-center shadow border flex flex-col justify-between ${cardBg}`;
                
                let innerHTMLContent = `
                    <div>
                        <div class="font-bold text-slate-200 truncate">${p.name} ${isMe ? '(คุณ)' : ''}</div>
                        <div class="mt-2 py-2 px-1 bg-slate-800/80 rounded-lg border border-slate-700/60 ${textWordColor}">${textWord}</div>
                    </div>
                `;

                // 🔘 แสดงปุ่มกดจัดการต่างๆ ใต้การ์ดเพื่อน (ต้องไม่ใช่การ์ดของตัวเอง)
                if(!isMe) {
                    // 1. ช่วง Lobby: บอสเจ้าของห้องเห็นปุ่มเตะคนออกได้
                    if(gameState.status === 'waiting' && myRole === 'boss') {
                        innerHTMLContent += `
                            <button onclick="bossKickPlayer('${p.id}')" class="mt-3 w-full bg-slate-700 hover:bg-rose-600 text-slate-300 hover:text-white text-xs font-bold py-1.5 rounded-lg transition border border-slate-600/50 transform active:scale-95 shadow">
                                👞 เตะออก
                            </button>
                        `;
                    }
                    // 2. ช่วงเริ่มเล่นเกม: ทุกคนสามารถกดปุ่ม "ตกรอบ" ให้เพื่อนได้
                    else if(gameState.status === 'playing' && !p.isDead) {
                        innerHTMLContent += `
                            <button onclick="sendActionToHost({type: 'actionEliminate', targetId: '${p.id}'})" class="mt-3 w-full bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold py-1.5 rounded-lg transition transform active:scale-95 shadow">
                                💀 กดตกรอบ
                            </button>
                        `;
                    }
                    // 3. ช่วงหมดเวลา: ปุ่มตกรอบเปลี่ยนเป็นปุ่ม "ถูก" และ "ผิด" ให้ทุกคนกดโหวตตัดสินกันได้เอง
                    else if(gameState.status === 'timeout' && !p.isDead && !p.isRevealed) {
                        innerHTMLContent += `
                            <div class="grid grid-cols-2 gap-2 mt-3">
                                <button onclick="sendActionToHost({type: 'actionJudge', targetId: '${p.id}', result: 'correct'})" class="bg-emerald-600 hover:bg-emerald-700 text-white text-[11px] font-black py-1.5 rounded-lg transition transform active:scale-95 shadow">
                                    ✅ ถูก
                                </button>
                                <button onclick="sendActionToHost({type: 'actionJudge', targetId: '${p.id}', result: 'wrong'})" class="bg-rose-600 hover:bg-rose-700 text-white text-[11px] font-black py-1.5 rounded-lg transition transform active:scale-95 shadow">
                                    ❌ ผิด
                                </button>
                            </div>
                        `;
                    }
                }

                card.innerHTML = innerHTMLContent;
                grid.appendChild(card);
            });
        }

        // 👑 4. ลอจิกกดเริ่มเกมสำหรับบอส
        function bossStartGame() {
            gameState.status = 'countdown';
            let secCount = 5;
            gameState.countdownVal = secCount;
            
            const pool = wordPools[Math.floor(Math.random() * wordPools.length)];
            const shuffled = [...pool].sort(() => 0.5 - Math.random());
            
            let i = 0;
            for(let key in gameState.players) {
                gameState.players[key].word = shuffled[i % shuffled.length];
                gameState.players[key].isDead = false; 
                gameState.players[key].isRevealed = false;
                gameState.players[key].gameResult = "";
                i++;
            }
            broadcastState();
            updateUI();

            let cdInterval = setInterval(() => {
                secCount--;
                if(secCount > 0) {
                    gameState.countdownVal = secCount;
                    broadcastState();
                    updateUI();
                } else {
                    clearInterval(cdInterval);
                    gameState.status = 'playing';
                    broadcastState();
                    updateUI();
                    startBossTimer(selectedSeconds); 
                }
            }, 1000);
        }

        function startBossTimer(duration) {
            let remain = duration;
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-end').classList.remove('hidden');

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let min = Math.floor(remain / 60);
                let sec = remain % 60;
                gameState.timer = `${min < 10 ? "0"+min : min}:${sec < 10 ? "0"+sec : sec}`;
                
                if (--remain < 0) {
                    clearInterval(timerInterval);
                    gameState.status = 'timeout';
                }
                broadcastState();
                updateUI();
            }, 1000);
        }

        function bossEndGame() {
            clearInterval(timerInterval);
            gameState.status = 'waiting';
            
            let min = Math.floor(selectedSeconds / 60);
            gameState.timer = `${min < 10 ? "0"+min : min}:00`;

            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-end').classList.add('hidden');
            broadcastState();
            updateUI();
        }

        function broadcastState() {
            connections.forEach(conn => {
                if(conn.open) {
                    conn.send({ type: 'stateUpdate', state: gameState });
                }
            });
        }

        function toggleTheme(state) {
            const body = document.getElementById('game-body');
            const card = document.getElementById('main-card');
            if(state === 'game-active') {
                body.className = "min-h-screen font-sans flex items-center justify-center p-4 bg-emerald-800 transition-colors duration-500";
                card.className = "w-full max-w-4xl bg-slate-900/95 text-white rounded-2xl p-6 border border-emerald-500/30 backdrop-blur-sm shadow-2xl";
            } else if (state === 'game-timeout') {
                body.className = "min-h-screen font-sans flex items-center justify-center p-4 bg-rose-800 transition-colors duration-500";
                card.className = "w-full max-w-4xl bg-slate-900/95 text-white rounded-2xl p-6 border border-rose-500/30 backdrop-blur-sm shadow-2xl";
            } else {
                body.className = "bg-slate-900 min-h-screen font-sans text-slate-100 flex items-center justify-center p-4 transition-colors duration-500";
                card.className = "w-full max-w-4xl bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700 transition-all duration-500";
            }
        }
    </script>
</body>
